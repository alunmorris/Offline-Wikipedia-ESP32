[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bodmer/TFT_eSPI @ 2.5.43
board_build.partitions = huge_app.csv
build_flags =
    ; TFT_eSPI — ILI9341 variant 2 on HSPI, touch handled separately via XPT2046_Touchscreen
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_MOSI=13 -DTFT_MISO=12 -DTFT_SCLK=14 -DTFT_CS=15 -DTFT_DC=2 -DTFT_RST=-1
    -DTOUCH_CS=-1
    -DTFT_INVERSION_ON=1
    -DLOAD_GLCD=1 -DLOAD_FONT2=1 -DLOAD_FONT4=1 -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=27000000
